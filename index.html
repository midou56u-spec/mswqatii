<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسوقاتي AI</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 0;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(-50%) translateX(0); }
            25% { transform: translateX(-50%) translateX(-5px); }
            75% { transform: translateX(-50%) translateX(5px); }
        }
        .animate-shake { animation: shake 0.5s ease-in-out; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        #error-display {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #fee2e2;
            color: #b91c1c;
            padding: 1rem;
            z-index: 9999;
            font-family: sans-serif;
            border-bottom: 2px solid #ef4444;
            text-align: center;
        }
    </style>
  <script type="module" crossorigin src="/assets/index-BI9iLvJY.js"></script>
</head>
<body>
    <div id="error-display"></div>
    <div id="root"></div>

    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const display = document.getElementById('error-display');
            display.style.display = 'block';
            let errorMsg = msg;
            if (error && error.message) errorMsg = error.message;
            display.innerHTML = `<b>خطأ في البرنامج:</b> ${errorMsg} <br><small>${url}:${lineNo}</small>`;
            return false;
        };
    </script>

</body>
</html>
