<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسوقاتي AI - Standalone</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 0;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(-50%) translateX(0); }
            25% { transform: translateX(-50%) translateX(-5px); }
            75% { transform: translateX(-50%) translateX(5px); }
        }
        .animate-shake { animation: shake 0.5s ease-in-out; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        #error-display {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #fee2e2;
            color: #b91c1c;
            padding: 1rem;
            z-index: 9999;
            font-family: sans-serif;
            border-bottom: 2px solid #ef4444;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="error-display"></div>
    <div id="root"></div>

    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const display = document.getElementById('error-display');
            display.style.display = 'block';
            display.innerHTML = `<b>خطأ في البرنامج:</b> ${msg} <br><small>${url}:${lineNo}</small>`;
            return false;
        };
    </script>

    <script type="module">
        import { h, render } from 'https://esm.sh/preact';
        import { useState, useEffect, useMemo } from 'https://esm.sh/preact/hooks';
        import htm from 'https://esm.sh/htm';
        import { GoogleGenAI } from 'https://esm.run/@google/genai';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { 
            getFirestore, 
            collection, 
            doc, 
            setDoc, 
            getDoc, 
            getDocs, 
            onSnapshot, 
            query, 
            where, 
            updateDoc, 
            increment,
            deleteDoc
        } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const html = htm.bind(h);

        // --- Configuration ---
        const firebaseConfig = {
            projectId: "gen-lang-client-0875902085",
            appId: "1:852106800021:web:2420af81b94cc4b67d649c",
            apiKey: "AIzaSyBcFY_4bq5HWWAeN3aNU4fFWA7P8_LJ-RQ",
            authDomain: "gen-lang-client-0875902085.firebaseapp.com",
            storageBucket: "gen-lang-client-0875902085.firebasestorage.app",
            messagingSenderId: "852106800021",
            measurementId: ""
        };
        const firestoreDatabaseId = "ai-studio-6100c38d-0c90-47d2-bd34-dbb846b47b30";
        const GEMINI_API_KEY = "AIzaSyBcFY_4bq5HWWAeN3aNU4fFWA7P8_LJ-RQ";

        // Initialize Firebase
        console.log("Initializing Firebase and AI...");
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, firestoreDatabaseId);
        
        let ai = null;
        try {
            if (GEMINI_API_KEY && GEMINI_API_KEY.trim() !== "" && GEMINI_API_KEY !== "YOUR_KEY_HERE") {
                ai = new GoogleGenAI({ apiKey: GEMINI_API_KEY });
            }
        } catch (e) {
            console.error("AI Init Error:", e);
        }
        console.log("Initialization complete.");

        // --- Icons ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                PenTool: html`<path d="m12 19 7-7 3 3-7 7-3-3Zm0 0-3-3m0 0 2.29-2.29c.39-.39.39-1.02 0-1.41l-4.24-4.24c-.39-.39-1.02-.39-1.41 0L3.34 10.4c-.39.39-.39 1.02 0 1.41l4.24 4.24c.39.39 1.02.39 1.41 0L11.29 13.7M9 16l-2 2" />`,
                LayoutDashboard: html`<path d="M3 3h7v7H3zm11 0h7v7h-7zm0 11h7v7h-7zM3 14h7v7H3z" />`,
                CreditCard: html`<rect width="20" height="14" x="2" y="5" rx="2" /><path d="M2 10h20" />`,
                Settings: html`<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" />`,
                LogOut: html`<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4m7 14 5-5-5-5m5 5H9" />`,
                Plus: html`<path d="M12 5v14m-7-7h14" />`,
                ImageIcon: html`<rect width="18" height="18" x="3" y="3" rx="2" ry="2" /><circle cx="9" cy="9" r="2" /><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />`,
                X: html`<path d="M18 6 6 18M6 6l12 12" />`,
                Copy: html`<rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />`,
                AlertCircle: html`<circle cx="12" cy="12" r="10" /><line x1="12" x2="12" y1="8" y2="12" /><line x1="12" x2="12.01" y1="16" y2="16" />`,
                Loader2: html`<path d="M21 12a9 9 0 1 1-6.219-8.56" />`,
                Users: html`<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" />`,
                Key: html`<path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3-3.5 3.5z" />`,
                Video: html`<path d="m22 8-6 4 6 4V8Z" /><rect width="14" height="12" x="2" y="6" rx="2" ry="2" />`,
                Smartphone: html`<rect width="14" height="20" x="5" y="2" rx="2" ry="2" /><path d="M12 18h.01" />`,
                Trash2: html`<path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 9v4m4-4v4" />`,
                BarChart3: html`<path d="M3 3v18h18m-18-4h4m4-4h4m4-4h4" />`,
                Search: html`<circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" />`
            };
            return html`
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class=${className}>
                    ${icons[name] || html`<circle cx="12" cy="12" r="10" />`}
                </svg>
            `;
        };

        const App = () => {
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem('app_user');
                return saved ? JSON.parse(saved) : null;
            });
            const [profile, setProfile] = useState(null);
            const [activeTab, setActiveTab] = useState('generate');
            const [productName, setProductName] = useState('');
            const [productDesc, setProductDesc] = useState('');
            const [refinement, setRefinement] = useState('');
            const [generatedPosts, setGeneratedPosts] = useState([]);
            const [generatedScripts, setGeneratedScripts] = useState([]);
            const [generating, setGenerating] = useState(false);
            const [image, setImage] = useState(null);
            const [imagePreview, setImagePreview] = useState(null);
            const [error, setError] = useState(null);
            const [success, setSuccess] = useState(null);
            
            const [phone, setPhone] = useState('');
            const [password, setPassword] = useState('');
            const [displayName, setDisplayName] = useState('');
            const [authMode, setAuthMode] = useState('login');
            
            const [activationKey, setActivationKey] = useState('');
            const [stats, setStats] = useState(null);
            const [adminKeys, setAdminKeys] = useState([]);
            const [allUsersCount, setAllUsersCount] = useState(0);
            const [searchId, setSearchId] = useState('');
            const [foundUser, setFoundUser] = useState(null);

            useEffect(() => {
                if (user?.uid) {
                    const unsub = onSnapshot(doc(db, 'users', user.uid), (snapshot) => {
                        if (snapshot.exists()) {
                            const data = snapshot.data();
                            setProfile(data);
                            if (data.phone === 'admin' && data.role !== 'admin') {
                                updateDoc(doc(db, 'users', user.uid), { role: 'admin' });
                            }
                        }
                    });
                    return unsub;
                }
            }, [user]);

            useEffect(() => {
                if (profile?.role === 'admin') {
                    const unsubStats = onSnapshot(doc(db, 'stats', 'global'), d => setStats(d.data()));
                    const unsubKeys = onSnapshot(collection(db, 'activationKeys'), s => {
                        setAdminKeys(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.createdAt-a.createdAt));
                    });
                    getDocs(collection(db, 'users')).then(s => setAllUsersCount(s.size));
                    return () => { unsubStats(); unsubKeys(); };
                }
            }, [profile]);

            useEffect(() => {
                const bootstrap = async () => {
                    const adminDoc = await getDoc(doc(db, 'users', 'admin'));
                    if (!adminDoc.exists()) {
                        await setDoc(doc(db, 'users', 'admin'), {
                            uid: 'admin',
                            phone: 'admin',
                            password: '1182019', 
                            displayName: 'المدير العام',
                            role: 'admin',
                            shortId: '000000',
                            createdAt: Date.now(),
                            isActiveUntil: null
                        });
                    }
                };
                bootstrap();
            }, []);

            const handleLogin = async () => {
                setError(null);
                if (!phone || !password) return setError('كمل البيانات يا بطل');
                try {
                    const q = query(collection(db, 'users'), where('phone', '==', phone), where('password', '==', password));
                    const s = await getDocs(q);
                    if (s.empty) return setError('البيانات غلط، ركز شوية');
                    const userData = { uid: s.docs[0].id, ...s.docs[0].data() };
                    setUser(userData);
                    localStorage.setItem('app_user', JSON.stringify(userData));
                } catch (e) { setError(e.message); }
            };

            const handleRegister = async () => {
                setError(null);
                if (!phone || !password || !displayName) return setError('كمل البيانات كلها');
                try {
                    const q = query(collection(db, 'users'), where('phone', '==', phone));
                    const s = await getDocs(q);
                    if (!s.empty) return setError('الرقم ده مسجل قبل كده');
                    const uid = 'u_' + Date.now();
                    const shortId = Math.floor(100000 + Math.random() * 900000).toString();
                    const userData = { 
                        uid, 
                        phone, 
                        password, 
                        displayName, 
                        role: 'user', 
                        shortId, 
                        createdAt: Date.now(), 
                        isActiveUntil: null,
                        trialPostsCount: 6,
                        trialScriptsCount: 6
                    };
                    await setDoc(doc(db, 'users', uid), userData);
                    setUser(userData);
                    localStorage.setItem('app_user', JSON.stringify(userData));
                } catch (e) { setError(e.message); }
            };

            const handleImageChange = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64 = reader.result.split(',')[1];
                        setImage({ type: file.type, base64 });
                        setImagePreview(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleGenerate = async () => {
                if (!productName && !image) return setError('اكتب اسم المنتج أو ارفع صورة الأول');
                
                const isTikTok = activeTab === 'tiktok';
                const now = Date.now();
                const isActive = profile?.role === 'admin' || (profile?.isActiveUntil && profile.isActiveUntil > now);
                
                if (!isActive) {
                    if (isTikTok && (profile?.trialScriptsCount || 0) <= 0) {
                        return setError('خلصت تجارب السكربتات يا نجم، فعل الحساب عشان تكمل');
                    }
                    if (!isTikTok && (profile?.trialPostsCount || 0) <= 0) {
                        return setError('خلصت تجارب البوستات يا نجم، فعل الحساب عشان تكمل');
                    }
                }

                setGenerating(true); setError(null);
                const systemPrompt = isTikTok 
                    ? `أنت خبير صناعة محتوى تيك توك (TikTok Creator) مصري محترف وعالمي. مهمتك كتابة 3 نماذج لسكربتات فيديو تيك توك "تريند" واحترافية جداً بالعامية المصرية الراقية.
السكربت لازم يكون متقسم بوضوح كأنك مخرج سينمائي:
- [المشهد]: وصف دقيق للي بيحصل قدام الكاميرا (زوايا التصوير، الحركة).
- [الكلام]: النص اللي هيتقال بظبط بأسلوب خاطف وذكي.
- [الكتابة]: الجمل اللي هتظهر على الشاشة (Hooks) عشان تشد العين.
الأسلوب لازم يكون "شيك" ولبق جداً، بعيد عن الابتذال وبعيد عن الفصحى.
إذا وجدت صورة، حللها وادمج تفاصيلها في السيناريو بذكاء.
اكتب 3 سكربتات فقط، وافصل بينهم بكلمة "---SPLIT---".`
                    : `أنت كاتب محتوى تسويقي مصري محترف، مثقف، ولبق جداً. مهمتك كتابة 3 نماذج لبوستات سوشيال ميديا بالعامية المصرية الراقية (لغة الطبقة المثقفة).
ممنوع تماماً استخدام لغة عربية فصحى (زي: هذا، سوف، نحن، رائع، مذهل).
استخدم بدائل مصرية مهذبة وشيك (زي: "ده"، "دي"، "هنـ"، "إحنا"، "حاجة راقية"، "ممتاز"، "اتفضلوا").
الأسلوب لازم يكون "سمبل" وشيك، كأنك بتكلم عميل VIP في مكان هادي.
إذا وجدت صورة، حللها كأنك خبير: "شوف" التفاصيل، الألوان، والجودة، واستخدم ده في الإقناع.
اكتب 3 بوستات فقط، بدون أي رغي زيادة.
افصل بين كل بوست والتاني بكلمة "---SPLIT---".`;

                let promptText = "";
                if (productName) promptText += `اسم المنتج/الموضوع: ${productName}. \n`;
                if (productDesc) promptText += `تفاصيل: ${productDesc}. \n`;
                if (image) promptText += `بص على الصورة دي كويس وحللها واكتب عنها بأسلوب شيك. \n`;
                if (refinement) promptText += `ملحوظة مهمة من المستخدم: ${refinement} \n`;
                
                try {
                    const parts = [{ text: promptText }];
                    if (image) {
                        parts.push({ inlineData: { data: image.base64, mimeType: image.type } });
                    }

                    const response = await ai.models.generateContent({
                        model: "gemini-3-flash-preview",
                        contents: [{ role: "user", parts }],
                        config: {
                            systemInstruction: systemPrompt,
                            temperature: 0.7,
                        }
                    });

                    const text = response.text;
                    if (text) {
                        const results = text.split('---SPLIT---').map(p => p.trim()).filter(p => p.length > 0);
                        if (isTikTok) setGeneratedScripts(results.slice(0, 3));
                        else setGeneratedPosts(results.slice(0, 3));
                        setSuccess(isTikTok ? 'السكربتات جاهزة يا نجم! 🎬' : 'البوستات جاهزة يا فنان! ✨');
                        
                        // Update usage
                        const updates = { aiRequestsCount: increment(1) };
                        if (!isActive) {
                            if (isTikTok) updates.trialScriptsCount = increment(-1);
                            else updates.trialPostsCount = increment(-1);
                        }
                        await updateDoc(doc(db, 'users', user.uid), updates).catch(()=>{});
                        await updateDoc(doc(db, 'stats', 'global'), { aiRequestsCount: increment(1) }).catch(()=>{});
                    } else throw new Error('جيمناي مطلعش رد، جرب تاني');
                } catch (e) { 
                    console.error("AI Error:", e);
                    setError('مشكلة في الذكاء الاصطناعي: ' + e.message); 
                }
                setGenerating(false);
            };

            const handleActivate = async () => {
                if (!activationKey) return;
                try {
                    const keyDoc = await getDoc(doc(db, 'activationKeys', activationKey));
                    if (!keyDoc.exists() || keyDoc.data()?.used) return setError('الكود ده غلط أو استُخدم قبل كده');
                    const data = keyDoc.data();
                    const updates = {};
                    let msg = "";
                    
                    if (data.days) {
                        const currentEnd = profile?.isActiveUntil || Date.now();
                        updates.isActiveUntil = Math.max(currentEnd, Date.now()) + (data.days * 24 * 60 * 60 * 1000);
                        msg = `تم التفعيل بنجاح لمدة ${data.days} يوم!`;
                    } else {
                        updates.trialPostsCount = (profile?.trialPostsCount || 0) + (data.posts || 0);
                        updates.trialScriptsCount = (profile?.trialScriptsCount || 0) + (data.scripts || 0);
                        msg = `تم إضافة ${data.posts || 0} بوست و ${data.scripts || 0} سكربت لرصيدك!`;
                    }
                    
                    await updateDoc(doc(db, 'users', user.uid), updates);
                    await updateDoc(doc(db, 'activationKeys', activationKey), { used: true });
                    setSuccess(msg);
                    setActivationKey('');
                } catch (e) { setError(e.message); }
            };

            const generateKey = async (config) => {
                try {
                    const id = Math.random().toString(36).substring(2, 10).toUpperCase();
                    await setDoc(doc(db, 'activationKeys', id), { ...config, used: false, createdAt: Date.now() });
                    setSuccess('تم توليد الكود بنجاح: ' + id);
                } catch (e) { setError('فشل توليد الكود: ' + e.message); }
            };

            const searchUser = async () => {
                if (!searchId) return;
                const q = query(collection(db, 'users'), where('shortId', '==', searchId));
                const s = await getDocs(q);
                if (s.empty) return setError('المستخدم مش موجود');
                setFoundUser({ uid: s.docs[0].id, ...s.docs[0].data() });
            };

            const logout = () => { setUser(null); localStorage.removeItem('app_user'); };

            if (!user) {
                return html`
                    <div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-blue-600 to-indigo-900" dir="rtl">
                        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden transform transition-all">
                            <div class="p-8 text-center bg-blue-50">
                                <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-lg rotate-3">
                                    <${Icon} name="PenTool" className="text-white w-10 h-10 -rotate-3" />
                                </div>
                                <h1 class="text-3xl font-black text-blue-900 mb-2">مسوقاتي AI</h1>
                                <p class="text-blue-600 font-medium">كاتب البوستات المصري الاحترافي</p>
                            </div>
                            <div class="p-8 space-y-4">
                                ${error && html`<div class="bg-red-50 text-red-600 p-4 rounded-2xl flex items-center gap-2 text-sm font-bold border border-red-100"><${Icon} name="AlertCircle" className="w-4 h-4" /> ${error}</div>`}
                                <div class="space-y-3">
                                    <div class="relative">
                                        <${Icon} name="Smartphone" className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5" />
                                        <input type="text" placeholder="رقم الموبايل" value=${phone} onInput=${e => setPhone(e.target.value)} class="w-full p-4 pr-12 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none transition-all font-bold" />
                                    </div>
                                    <div class="relative">
                                        <${Icon} name="Key" className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5" />
                                        <input type="password" placeholder="كلمة السر" value=${password} onInput=${e => setPassword(e.target.value)} class="w-full p-4 pr-12 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none transition-all font-bold" />
                                    </div>
                                    ${authMode === 'register' && html`
                                        <div class="relative">
                                            <${Icon} name="Users" className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5" />
                                            <input type="text" placeholder="اسمك بالكامل" value=${displayName} onInput=${e => setDisplayName(e.target.value)} class="w-full p-4 pr-12 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none transition-all font-bold" />
                                        </div>
                                    `}
                                </div>
                                <button onClick=${authMode === 'login' ? handleLogin : handleRegister} class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95">${authMode === 'login' ? 'دخول يا بطل' : 'سجل حساب جديد'}</button>
